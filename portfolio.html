<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Portfolio</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#050816;
    color:white;
    min-height:100vh;
    padding:40px;
}

/* CONTAINER */

.container{
    max-width:1000px;
    margin:auto;
}

/* TITLE */

.title{
    margin-bottom:30px;
}

.title h1{
    font-size:50px;
}

.title p{
    margin-top:10px;
    color:#9ca3af;
    font-size:18px;
}

/* FORM */

.form-box{
    background:#0b1023;
    border:1px solid #1f2945;
    border-radius:25px;
    padding:35px;
}

/* GRID */

.form-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:25px;
}

/* INPUT GROUP */

.input-group{
    display:flex;
    flex-direction:column;
}

.input-group label{
    margin-bottom:10px;
    font-size:17px;
}

.input-group input,
.input-group textarea,
.input-group select{
    background:#111827;
    border:1px solid #1f2945;
    outline:none;
    border-radius:15px;
    padding:15px;
    color:white;
    font-size:16px;
}

.input-group textarea{
    resize:none;
    height:130px;
}

/* FULL WIDTH */

.full{
    grid-column:1/3;
}

/* IMAGE UPLOAD */

.upload-box{
    border:2px dashed #6d28d9;
    border-radius:20px;
    padding:40px;
    text-align:center;
    background:#111827;
}

.upload-box i{
    font-size:45px;
    color:#8b5cf6;
    margin-bottom:15px;
}

.upload-box p{
    color:#9ca3af;
}

/* BUTTONS */

.buttons{
    margin-top:35px;
    display:flex;
    gap:20px;
}

.save-btn,
.publish-btn{
    flex:1;
    padding:18px;
    border:none;
    border-radius:16px;
    font-size:18px;
    cursor:pointer;
}

.save-btn{
    background:#111827;
    color:white;
}

.publish-btn{
    background:linear-gradient(to right,#6d28d9,#4f46e5);
    color:white;
}

/* SKILLS */

.skills{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
}

.skills span{
    background:#111827;
    border:1px solid #1f2945;
    padding:10px 18px;
    border-radius:30px;
}

/* MOBILE */

@media(max-width:800px){

    body{
        padding:20px;
    }

    .form-grid{
        grid-template-columns:1fr;
    }

    .full{
        grid-column:auto;
    }

    .title h1{
        font-size:35px;
    }

    .buttons{
        flex-direction:column;
    }
}

</style>
</head>
<body>

<div class="container">

<!-- TITLE -->

<div class="title">
<h1>Create Portfolio</h1>
<p>Fill your details and build your professional portfolio website.</p>
</div>

<!-- FORM -->

<div class="form-box">

<div class="form-grid">

<!-- NAME -->

<div class="input-group">
<label>Full Name</label>
<input type="text" placeholder="Enter your name">
</div>

<!-- ROLE -->

<div class="input-group">
<label>Profession</label>
<input type="text" placeholder="Web Developer">
</div>

<!-- EMAIL -->

<div class="input-group">
<label>Email</label>
<input type="email" placeholder="example@gmail.com">
</div>

<!-- PHONE -->

<div class="input-group">
<label>Phone Number</label>
<input type="text" placeholder="+91 9876543210">
</div>

<!-- WEBSITE -->

<div class="input-group">
<label>Website</label>
<input type="text" placeholder="yourwebsite.com">
</div>

<!-- LOCATION -->

<div class="input-group">
<label>Location</label>
<input type="text" placeholder="India">
</div>

<!-- TEMPLATE -->

<div class="input-group">
<label>Select Template</label>

<select>
<option>Dark Professional</option>
<option>Minimal Clean</option>
<option>Neon Style</option>
<option>Anime Style</option>
</select>

</div>

<!-- EXPERIENCE -->

<div class="input-group">
<label>Experience</label>

<select>
<option>Fresher</option>
<option>1 Year</option>
<option>2 Years</option>
<option>3+ Years</option>
</select>

</div>

<!-- ABOUT -->

<div class="input-group full">
<label>About You</label>

<textarea placeholder="Write about yourself..."></textarea>
</div>

<!-- SKILLS -->

<div class="input-group full">

<label>Skills</label>

<div class="skills">
<span>HTML</span>
<span>CSS</span>
<span>JavaScript</span>
<span>React</span>
<span>UI Design</span>
</div>

</div>

<!-- PROJECT -->

<div class="input-group full">
<label>Project Description</label>

<textarea placeholder="Describe your project..."></textarea>
</div>

<!-- UPLOAD -->

<div class="input-group full">

<label>Upload Profile Image</label>

<div class="upload-box">

<i class="fa-solid fa-cloud-arrow-up"></i>

<h2>Upload Image</h2>

<p>
Click or drag image here
</p>

</div>

</div>

</div>

<!-- BUTTONS -->

<div class="buttons">

<button class="save-btn">
Save Draft
</button>

<button class="publish-btn">
Publish Portfolio
</button>

</div>

</div>

</div>

</body>
</html>
